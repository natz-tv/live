<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" href="favicon.svg">
    <title>Natz Player - Live Stream</title>

    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://bhonat.my.id">

    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/shaka-player.compiled.js"></script>
</head>
<body>

    <header class="topbar">
        <div class="brand">
            <span class="logo-icon">▶</span> Natz Player
            <span class="badge-live">LIVE</span>
        </div>
        <div class="now-playing" id="topbar-title">Memuat...</div>
    </header>

    <main class="app-layout">
        <aside class="sidebar">
            <div class="search-box">
                <input type="text" id="search" placeholder="Cari tayangan..." autocomplete="off" aria-label="Cari tayangan">
            </div>
            <ul id="channel-list" class="channel-list"></ul>
        </aside>

        <section class="player-section">
            <div class="video-container" id="videoContainer">
                <video id="video" autoplay muted playsinline></video>

                <div class="hint-text" id="unmuteHint">Ketuk video untuk mengaktifkan suara</div>

                <div id="videoUI" class="video-ui hidden">
                    
                    <div class="controls-top-left">
                        <button id="btnSettings" class="icon-btn" title="Pengaturan" aria-label="Pengaturan">⚙</button>
                        <button id="btnFs" class="icon-btn" title="Layar Penuh" aria-label="Layar Penuh">⛶</button>
                    </div>

                    <div class="controls-bottom">
                        <h2 id="videoTitle">Memuat Tayangan...</h2>
                    </div>

                </div>

                <div id="settingsPanel" class="glass-panel" style="display: none;">
                    <div class="panel-header">
                        <span>Pengaturan</span>
                        <div class="tabs">
                            <button class="tab-btn active" data-target="quality">Kualitas</button>
                            <button class="tab-btn" data-target="audio">Audio</button>
                        </div>
                    </div>
                    <div class="panel-body">
                        <div id="tab-quality" class="tab-content active"></div>
                        <div id="tab-audio" class="tab-content"></div>
                    </div>
                </div>

                <div id="toast" class="toast-msg"></div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
